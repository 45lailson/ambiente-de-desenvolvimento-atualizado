version: '3.8'

services:

  web:
    image: webdevops/php-apache:8.2
    ports:
      - "4800:80"
    volumes:
      - ./www:/app
    environment:
      PHP_MEMORY_LIMIT: 2G
      PHP_MAX_EXECUTION_TIME: 600
      PHP_DEBUGGER: xdebug
      XDEBUG_MODE: debug
      XDEBUG_CLIENT_HOST: host.docker.internal
      XDEBUG_CLIENT_PORT: 9003
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cuidadores
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:5.2
    depends_on:
      - db
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root
    ports:
      - "8080:80"

volumes:
  db_data:
